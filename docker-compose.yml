version: '3.8'
services:
  db:
    image: mysql:8.0
    container_name: casdoor_db
    environment:
      - MYSQL_ROOT_PASSWORD=123
      - MYSQL_DATABASE=casdoor
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - auth_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p123"]
      interval: 10s
      timeout: 5s
      retries: 10

  casdoor:
    image: casbin/casdoor:latest
    container_name: casdoor
    environment:
      - RUN_MODE=dev
      - driverName=mysql
      - dataSourceName=root:123@tcp(db:3306)/
    volumes:
      - casdoor_data:/var/lib/casdoor
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - auth_network

  nginx:
    image: nginx:latest
    container_name: casdoor_proxy
    ports:
      - "8443:8443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./nginx:/etc/nginx/certs
    depends_on:
      - casdoor
    restart: on-failure
    networks:
      - auth_network

volumes:
  casdoor_data:
  db_data:

networks:
  auth_network:
    driver: bridge